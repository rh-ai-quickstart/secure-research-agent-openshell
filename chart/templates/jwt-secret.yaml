{{/*
  The OpenShell gateway requires a Secret named "openshell-jwt-keys" with
  Ed25519 signing keys. This secret is created by `make install` (or manually)
  before the chart is deployed, because Helm's sprig library does not support
  Ed25519 public key derivation.

  Create it manually if deploying without the Makefile:

    openssl genpkey -algorithm ed25519 -out /tmp/signing.pem
    openssl pkey -in /tmp/signing.pem -pubout -out /tmp/public.pem
    openssl rand -hex 16 > /tmp/kid
    oc create secret generic openshell-jwt-keys -n <namespace> \
      --from-file=signing.pem=/tmp/signing.pem \
      --from-file=public.pem=/tmp/public.pem \
      --from-file=kid=/tmp/kid
*/}}
