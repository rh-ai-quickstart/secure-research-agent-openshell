{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: aiq-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secure-research-agent.labels" . | nindent 4 }}
    app: aiq-ui
spec:
  selector:
    app: aiq-ui
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
{{- end }}
