apiVersion: v1
kind: Service
metadata:
  name: aiq-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secure-research-agent.labels" . | nindent 4 }}
    app: aiq-backend
spec:
  selector:
    app: aiq-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
