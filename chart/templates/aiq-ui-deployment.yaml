{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiq-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secure-research-agent.labels" . | nindent 4 }}
    app: aiq-ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: aiq-ui
  template:
    metadata:
      labels:
        app: aiq-ui
    spec:
      containers:
        - name: ui
          image: {{ .Values.ui.image }}
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://aiq-backend.{{ .Release.Namespace }}.svc:8000"
            - name: REQUIRE_AUTH
              value: "false"
            - name: NODE_ENV
              value: "production"
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
{{- end }}
