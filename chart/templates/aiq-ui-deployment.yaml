{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiq-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secure-research-agent.labels" . | nindent 4 }}
    app: aiq-ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: aiq-ui
  template:
    metadata:
      labels:
        app: aiq-ui
    spec:
      containers:
        - name: ui
          image: {{ .Values.ui.image }}
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: BACKEND_URL
              value: "http://aiq-backend.{{ .Release.Namespace }}.svc:8000"
            - name: REQUIRE_AUTH
              value: "false"
            - name: NODE_ENV
              value: "production"
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
        - name: cache-guard
          image: {{ .Values.ui.cacheGuard.image | default "nginxinc/nginx-unprivileged:1-alpine" }}
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: nginx-config
          configMap:
            name: aiq-ui-nginx-config
{{- end }}
