apiVersion: v1
kind: Secret
metadata:
  name: aiq-sandbox-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secure-research-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  .env: |
    OPENSHELL=true
    NVIDIA_API_KEY={{ .Values.apiKeys.nvidia }}
    TAVILY_API_KEY={{ .Values.apiKeys.tavily }}
    HTTP_PROXY=http://{{ .Values.config.proxyHost }}:{{ .Values.config.proxyPort }}
    HTTPS_PROXY=http://{{ .Values.config.proxyHost }}:{{ .Values.config.proxyPort }}
    CONFIG_FILE={{ .Values.config.configFile }}
    HOST={{ .Values.config.host }}
    PORT={{ .Values.config.port }}
    PYTHONUNBUFFERED=1
    PYTHONDONTWRITEBYTECODE=1
    NAT_JOB_STORE_DB_URL=sqlite+aiosqlite:////sandbox/data/jobs.db
    AIQ_CHROMA_DIR=/sandbox/data/chroma_data
    AIQ_CHECKPOINT_DB=/sandbox/data/checkpoints.db
    AIQ_SUMMARY_DB=sqlite+aiosqlite:////sandbox/data/summaries.db
