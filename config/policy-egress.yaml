# OpenShell sandbox egress policy for the AIQ research agent.
#
# NVIDIA NIM (LLM inference) uses credential isolation via the OpenShell
# inference routing proxy (inference.local). The NVIDIA API key is stored
# at the gateway level and injected by the proxy — it never enters the
# sandbox.
#
# NVIDIA embeddings (knowledge layer) require direct access to
# integrate.api.nvidia.com because the gateway's inference routing only
# supports /v1/chat/completions, not /v1/embeddings. The real NVIDIA API
# key must be set in the sandbox .env for embedding calls.
#
# Tavily (web search) is allowed as a direct endpoint.
# To add additional services, append entries under network_policies.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null, /etc/hosts]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  aiq_tavily:
    name: aiq_tavily
    endpoints:
      - { host: api.tavily.com, port: 443 }
    binaries:
      - { path: /app/.venv/bin/python }
      - { path: /app/.venv/bin/python3.12 }
      - { path: /usr/bin/python3.12 }
      - { path: /app/.venv/bin/dask-worker }
      - { path: /app/.venv/bin/dask-scheduler }
      - { path: /usr/bin/curl }
  aiq_nvidia_embeddings:
    name: aiq_nvidia_embeddings
    endpoints:
      - { host: integrate.api.nvidia.com, port: 443 }
    binaries:
      - { path: /app/.venv/bin/python }
      - { path: /app/.venv/bin/python3.12 }
      - { path: /usr/bin/python3.12 }
      - { path: /app/.venv/bin/dask-worker }
      - { path: /app/.venv/bin/dask-scheduler }
